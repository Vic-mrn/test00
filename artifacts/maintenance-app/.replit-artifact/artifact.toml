kind = "web"
previewPath = "/"
title = "Control de Mantenimiento"
version = "1.0.0"
id = "artifacts/maintenance-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23006

[services.development]
run = "pnpm --filter @workspace/maintenance-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/maintenance-app", "run", "build" ]
publicDir = "artifacts/maintenance-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23006"
BASE_PATH = "/"
